name: Composer Command
on:
  workflow_dispatch:
    inputs:
      id:
        description: "project id (without 'composer-' phrase)"
        required: true
        type: string
      command:
        description: "composer command (without 'composer ...' prefix)"
        required: true
        type: string
      content:
        description: "composer.json content"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer self-update

      - name: Create Project Directory
        run: |
          FOLDER_BASE="composer"
          mkdir -p $FOLDER_BASE
          cd $FOLDER_BASE

          FOLDER_NAME="composer-${{ github.event.inputs.id }}"
          mkdir -p $FOLDER_NAME
          cd $FOLDER_NAME
          composer ${{ github.event.inputs.command }}

          cd ..
          zip -rq "$FOLDER_NAME.zip" "$FOLDER_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FOLDER_BASE/$FOLDER_NAME"
          git commit -m $FOLDER_NAME
          git push
