name: Composer Command
on:
  workflow_dispatch:
    inputs:
      project_path:
        description: "project path where located composer.json (/composer/project1)"
        required: true
        type: string
      content:
        description: "composer.json content"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer self-update

      - name: Create Project Directory
        run: |
          BASE_PATH="$PWD/../../composer"
          PROJECT_PATH="$BASE_PATH/${{ github.event.inputs.project_path }}"
          ARCHIVE_PATH="$BASE_PATH/${{ github.event.inputs.project_path }}.zip"
          PROJECT_DIR="$(dirname "$PROJECT_PATH")"

          mkdir -p $PROJECT_PATH

          cd $PROJECT_PATH

          composer ${{ github.event.inputs.command }}

          cd $PROJECT_DIR
          zip -r "$ARCHIVE_PATH" "$PROJECT_PATH"

          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$ARCHIVE_PATH"
          git commit -m $ARCHIVE_PATH
          git push
